<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>NFT Preview Card Component</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<div class="card">
			<img
				class="nft-card-image"
				src="./images/image-equilibrium.jpg"
				alt="nft image"
			/>
			<div class="img-overlay">
				<img class="view-icon" src="./images/icon-view.svg" alt="View Icon" />
			</div>
			<h2>Equilibrium #3429</h2>
			<p>Our Equilibrium collection promotes balance and calm.</p>
			<div class="container">
				<div class="price">
					<img src="./images/icon-ethereum.svg" alt="Ethereum Icon" />
					<div>0.041 ETH</div>
				</div>
				<div class="time">
					<img src="./images/icon-clock.svg" alt="Clock Icon" />
					<div>3 days left</div>
				</div>
			</div>
			<div class="creator">
				<img src="./images/image-avatar.png" alt="creator" />
				<div>Creation of <span>Jules Wyvern</span></div>
			</div>
		</div>

		<div class="attribution">
			Challenge by
			<a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
				>Frontend Mentor</a
			>. Coded by
			<a href="https://github.com/HaylzRandom" target="_blank"
				>Hayley McCafferty</a
			>.
		</div>
	</body>
</html>
